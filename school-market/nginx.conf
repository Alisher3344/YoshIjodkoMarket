# yoshijodkor.uz — Nginx konfiguratsiyasi
# /etc/nginx/sites-available/yoshijodkor.uz ga ko'chiring

server {
    listen 80;
    server_name yoshijodkor.uz www.yoshijodkor.uz;
    
    # HTTPS ga yo'naltirish
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yoshijodkor.uz www.yoshijodkor.uz;

    # SSL sertifikat (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yoshijodkor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoshijodkor.uz/privkey.pem;

    # Frontend (React build)
    root /var/www/yoshijodkor.uz/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik fayllar cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Backend API
server {
    listen 443 ssl;
    server_name api.yoshijodkor.uz;

    ssl_certificate /etc/letsencrypt/live/yoshijodkor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoshijodkor.uz/privkey.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
