services:
db:
  image: postgres:16
  environment:
    POSTGRES_DB: yoshijodko
    POSTGRES_USER: yoshijodko
    POSTGRES_PASSWORD: strongpass
  volumes:
    - pgdata:/var/lib/postgresql/data

backend:
  build: ./YoshIjodkoMarket_backend
  depends_on: [db]
  environment:
    DATABASE_URL: ${DATABASE_URL}
  command: |
    sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

frontend:
  build: ./YoshIjodkorMarket_Frontend
  ports: ["80:80"]
